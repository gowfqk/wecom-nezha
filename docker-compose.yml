services:
  wecom-nezha:
    image: gowfqk/wecom-nezha:latest
    container_name: wecom-nezha
    ports:
      - "8080:8080"
    environment:
      # 认证密钥
      - SENDKEY=${SENDKEY:-set_a_sendkey}
      # 企业微信配置
      - WECOM_CID=${WECOM_CID}
      - WECOM_SECRET=${WECOM_SECRET}
      - WECOM_AID=${WECOM_AID}
      - WECOM_TOUID=${WECOM_TOUID:-@all}
      # 企业微信回调（可选）
      - WECOM_TOKEN=${WECOM_TOKEN:-}
      - WECOM_ENCODING_AES_KEY=${WECOM_ENCODING_AES_KEY:-}
      # 哪吒监控配置
      - NEZHA_URL=${NEZHA_URL}
      - NEZHA_USERNAME=${NEZHA_USERNAME}
      - NEZHA_PASSWORD=${NEZHA_PASSWORD}
      # 缓存配置
      - CACHE_TYPE=${CACHE_TYPE:-memory}
      - REDIS_STAT=${REDIS_STAT:-OFF}
      - REDIS_ADDR=${REDIS_ADDR:-redis:6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      # 邮件底部链接（可选）
      - MAIL_FOOTER_URL=${MAIL_FOOTER_URL:-}
      # Telegram Bot 配置（可选）
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_WEBHOOK_SECRET=${TELEGRAM_WEBHOOK_SECRET:-}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS:-}
      - TELEGRAM_API_BASE=${TELEGRAM_API_BASE:-https://api.telegram.org}
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # 可选：使用 Redis 缓存时启用
